name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # silence Node.js 20 deprecation warning

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Write .env
        run: echo "VITE_DROPBOX_APP_KEY=${{ secrets.VITE_DROPBOX_APP_KEY }}" > .env
        shell: bash
      - run: npm run electron:build
      - uses: actions/upload-artifact@v4
        with:
          name: Swipik-Windows
          path: release/*.exe
          retention-days: 30

  # Intel (x64) runner — builds natively for x64, avoids cross-compile issues with ffmpeg-static
  build-macos-x64:
    runs-on: macos-13
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false   # skip code-signing (no certificate in CI)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Write .env
        run: echo "VITE_DROPBOX_APP_KEY=${{ secrets.VITE_DROPBOX_APP_KEY }}" > .env
      - name: Vite build
        run: npm run build
      - name: Electron build (x64)
        run: npx electron-builder --mac --x64
      - uses: actions/upload-artifact@v4
        with:
          name: Swipik-macOS-x64
          path: release/*.dmg
          retention-days: 30

  # Apple Silicon (arm64) runner — builds natively for arm64
  build-macos-arm64:
    runs-on: macos-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Write .env
        run: echo "VITE_DROPBOX_APP_KEY=${{ secrets.VITE_DROPBOX_APP_KEY }}" > .env
      - name: Vite build
        run: npm run build
      - name: Electron build (arm64)
        run: npx electron-builder --mac --arm64
      - uses: actions/upload-artifact@v4
        with:
          name: Swipik-macOS-arm64
          path: release/*.dmg
          retention-days: 30
