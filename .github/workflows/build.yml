name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Write .env
        run: echo "VITE_DROPBOX_APP_KEY=${{ secrets.VITE_DROPBOX_APP_KEY }}" > .env
        shell: bash
      - name: Vite build
        run: npm run build
        shell: bash
      - name: Electron build
        run: npx electron-builder --win --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: Swipik-Windows
          path: release/*.exe
          retention-days: 30

  # macos-13 (Intel) was deprecated in early 2025 — only ARM runners remain.
  # arm64 binaries run natively on M-series Macs and transparently via Rosetta 2 on Intel.
  build-macos:
    runs-on: macos-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Write .env
        run: echo "VITE_DROPBOX_APP_KEY=${{ secrets.VITE_DROPBOX_APP_KEY }}" > .env
      - name: Vite build
        run: npm run build
      - name: Electron build (arm64)
        run: npx electron-builder --mac --arm64 --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: Swipik-macOS
          path: release/*.dmg
          retention-days: 30
