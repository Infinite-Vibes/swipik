name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: Swypik-Windows
            bundle_glob: |
              src-tauri/target/release/bundle/nsis/*.exe
              src-tauri/target/release/bundle/msi/*.msi
          - os: macos-latest
            artifact: Swypik-macOS
            # macos-latest is ARM; arm64 binaries run natively on M-series and
            # transparently via Rosetta 2 on Intel.
            bundle_glob: |
              src-tauri/target/release/bundle/dmg/*.dmg

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm ci

      - name: Write .env
        run: echo "VITE_DROPBOX_APP_KEY=${{ secrets.VITE_DROPBOX_APP_KEY }}" > .env
        shell: bash

      - name: Tauri build
        run: npx tauri build

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.bundle_glob }}
          retention-days: 30
          if-no-files-found: error
